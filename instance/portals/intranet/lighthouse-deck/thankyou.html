<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .slide-container { 
            width: 1280px; 
            min-height: 720px; 
            background-color: #0f172a; 
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        /* Background Grid */
        .bg-grid {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(58, 170, 220, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(58, 170, 220, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
        }

        /* Center Content */
        .content-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            text-align: center;
            width: 100%;
            padding-top: 40px;
        }

        .closing-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            color: #f59e0b;
            background: rgba(245, 158, 11, 0.1);
            padding: 8px 16px;
            border: 1px solid rgba(245, 158, 11, 0.3);
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        h1 {
            font-size: 72px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -1px;
            margin-bottom: 24px;
        }

        .subtitle {
            font-size: 28px;
            color: #94a3b8;
            font-weight: 300;
            max-width: 800px;
            line-height: 1.4;
            margin-bottom: 80px;
        }
        .subtitle strong {
            color: #3aaadc;
            font-weight: 500;
        }

        /* Contact Block */
        .contact-block {
            display: flex;
            gap: 40px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(58, 170, 220, 0.3);
            padding: 30px 60px;
            position: relative;
        }
        
        .contact-block::before {
            content: ''; position: absolute; top: -1px; left: -1px; width: 15px; height: 15px; border: 2px solid #3aaadc; border-right: none; border-bottom: none;
        }
        .contact-block::after {
            content: ''; position: absolute; bottom: -1px; right: -1px; width: 15px; height: 15px; border: 2px solid #3aaadc; border-left: none; border-top: none;
        }

        .contact-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
        }

        .contact-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: #3aaadc;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .contact-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 20px;
            color: #ffffff;
        }

        .divider {
            width: 1px;
            background: rgba(58, 170, 220, 0.3);
        }

        /* Bottom Bar */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: rgba(58, 170, 220, 0.1);
            border-top: 1px solid rgba(58, 170, 220, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            color: #ffffff;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="bg-grid"></div>
        
        <div class="content-area">
            <div class="closing-badge">COMMONS_ENGINEERING</div>
            
            <h1>Let's Build What's Next</h1>
            
            <div class="subtitle">
                The future belongs to those who build their own <strong>sovereign infrastructure.</strong>
            </div>
            
            <div class="contact-block">
                <div class="contact-item">
                    <div class="contact-label">WEB_DOCUMENTATION</div>
                    <div class="contact-value">commons-os.github.io</div>
                </div>
                
                <div class="divider"></div>
                
                <div class="contact-item">
                    <div class="contact-label">SOURCE_REPOSITORY</div>
                    <div class="contact-value">github.com/Commons-Engineering</div>
                </div>
            </div>
        </div>

        <div class="bottom-bar">
            >_ SESSION_TERMINATED. READY_FOR_INPUT.
        </div>
    </div>
</body>
</html>
